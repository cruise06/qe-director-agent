<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>QE Director Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --text: #eef2ff;
      --muted: #a8b3cf;
      --line: rgba(255,255,255,0.08);
      --accent: #7c9cff;
      --shadow: 0 20px 40px rgba(0,0,0,0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,156,255,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(79,124,255,0.12), transparent 24%),
        var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 56px 24px 72px; }
    .eyebrow {
      display: inline-block; padding: 6px 12px; border: 1px solid var(--line);
      border-radius: 999px; color: var(--muted); background: rgba(255,255,255,0.03);
      font-size: 13px; margin-bottom: 16px;
    }
    h1 { margin: 0 0 12px; font-size: 42px; line-height: 1.08; letter-spacing: -0.03em; }
    .sub { max-width: 760px; color: var(--muted); font-size: 17px; line-height: 1.65; margin: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; margin-top: 30px; }
    .card {
      display: block; text-decoration: none; color: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--line); border-radius: 20px; padding: 22px; min-height: 190px;
      box-shadow: var(--shadow); transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(124,156,255,0.45);
      background: linear-gradient(180deg, rgba(124,156,255,0.10), rgba(255,255,255,0.03));
    }
    .card-key {
      color: var(--accent); font-size: 13px; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase; margin-bottom: 12px;
    }
    .card h2 { margin: 0 0 10px; font-size: 22px; line-height: 1.2; }
    .card p { margin: 0 0 18px; color: var(--muted); line-height: 1.6; font-size: 15px; }
    .go { color: #d8e2ff; font-weight: 600; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Quality Engineering Workbench</div>
    <h1>QE Director Agent</h1>
    <p class="sub">选择一个真实任务入口，而不是直接操作底层 skill 与脚本。</p>

    <div class="grid">
      {% for skill in skills %}
      <a class="card" href="/skill/{{ skill.key }}">
        <div class="card-key">{{ skill.key }}</div>
        <h2>{{ skill.label }}</h2>
        <p>{{ skill.desc }}</p>
        <div class="go">进入 →</div>
      </a>
      {% endfor %}
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>反馈已保存</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0b1020; color:#eef2ff; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 24px 72px; }
    a { color:#8fb0ff; text-decoration:none; }
    .panel { background:#121933; border:1px solid rgba(255,255,255,.08); border-radius:20px; padding:28px; }
    .ok { color:#8ff0b6; font-weight:700; margin-bottom:14px; }
    .item { margin:10px 0; color:#dbe4ff; }
    .label { color:#8fa1c7; font-size:13px; margin-right:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="ok">反馈已保存</div>
      <div class="item"><span class="label">Skill:</span>{{ payload.skill }}</div>
      <div class="item"><span class="label">Case:</span>{{ payload.case_name }}</div>
      <div class="item"><span class="label">评级:</span>{{ payload.rating }}</div>
      <div class="item"><span class="label">问题类型:</span>{{ payload.issue_type }}</div>
      <div class="item"><span class="label">建议:</span>{{ payload.suggestion or "（空）" }}</div>
      <div style="margin-top:18px;"><a href="/">返回首页</a></div>
    </div>
  </div>
</body>
</html>
